<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compressore Immagini – QuickTools</title>
  <meta name="description" content="Riduci il peso delle immagini direttamente dal browser. Nessun upload.">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<header>
  <h1>Compressore Immagini</h1>
  <p>Riduci il peso delle immagini (JPG/PNG)</p>
</header>

<div class="ad ad-top">SPAZIO PUBBLICITARIO 728x90</div>

<main class="tool-container">

  <div class="tool-box">

    <input type="file" id="img" accept="image/*">

    <label>Qualità (0.1 - 1.0)</label>
    <input type="number" id="quality" min="0.1" max="1" step="0.1" value="0.7">

    <button id="compress">Comprimi</button>

    <div class="result" id="status">Nessuna immagine caricata.</div>

  </div>

</main>

<div class="ad ad-bottom">SPAZIO PUBBLICITARIO 728x90</div>

<footer>
  <p>© <span id="year"></span> QuickTools</p>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

document.getElementById("compress").addEventListener("click", () => {
  const file = document.getElementById("img").files[0];
  const quality = parseFloat(document.getElementById("quality").value);
  const status = document.getElementById("status");

  if (!file) {
    status.textContent = "Carica un'immagine.";
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      canvas.toBlob(
        (blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "compressed.jpg";
          a.click();

          status.textContent = "Compressione completata!";
        },
        "image/jpeg",
        quality
      );
    };
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
